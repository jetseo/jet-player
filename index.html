<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JET PLAYER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: #0f1621;
  --surface2: #161e2e;
  --border: rgba(255,255,255,0.07);
  --text: #e8eaf0;
  --muted: #5a6478;
  --accent: #4f8aff;
  --accent2: #8b5cf6;
  --gold: #f0c040;
  --red: #ff4f6a;
  --green: #34d399;
  --radius: 16px;
  --shadow: 0 24px 64px rgba(0,0,0,0.5);
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg: #f0f2f8;
  --surface: #ffffff;
  --surface2: #f5f7ff;
  --border: rgba(0,0,0,0.08);
  --text: #111827;
  --muted: #9ca3af;
  --shadow: 0 24px 64px rgba(0,0,0,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 60px;
  transition: background var(--transition), color var(--transition);
  overflow-x: hidden;
}

/* 배경 오브 */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(ellipse, rgba(79,138,255,0.08) 0%, transparent 70%);
  pointer-events: none;
  transition: var(--transition);
}
[data-theme="light"] body::before {
  background: radial-gradient(ellipse, rgba(79,138,255,0.05) 0%, transparent 70%);
}

/* ── Header ── */
.header {
  width: 100%;
  max-width: 480px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 28px;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.logo span {
  background: linear-gradient(135deg, var(--gold), #ff8c42);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 테마 토글 */
.theme-btn {
  width: 44px; height: 24px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  transition: var(--transition);
  flex-shrink: 0;
}
.theme-btn::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  transition: transform var(--transition);
  box-shadow: 0 2px 6px rgba(79,138,255,0.4);
}
[data-theme="light"] .theme-btn::after { transform: translateX(20px); }
.theme-icon { font-size: 14px; margin-right: 6px; }

/* ── 앨범아트 / 메인카드 ── */
.player-card {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 28px 24px 24px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.player-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
  opacity: 0.8;
}

/* 앨범아트 */
.artwork-wrap {
  width: 100%;
  aspect-ratio: 1;
  max-width: 220px;
  margin: 0 auto 24px;
  position: relative;
}
.artwork {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--surface2) 0%, var(--surface) 100%);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  transition: transform 0.1s;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 0 0 8px rgba(255,255,255,0.03);
  animation: spin 20s linear infinite;
  animation-play-state: paused;
  position: relative;
  overflow: hidden;
}
.artwork.playing { animation-play-state: running; }
/* artwork center dot removed */
@keyframes spin { to { transform: rotate(360deg); } }

.artwork-glow {
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(79,138,255,0.15) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}
.artwork.playing + .artwork-glow { opacity: 1; }

/* 트랙 정보 */
.track-info {
  text-align: center;
  margin-bottom: 20px;
}
.track-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.track-artist {
  font-size: 12px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
}

/* 프로그레스바 */
.progress-wrap {
  margin-bottom: 8px;
  cursor: pointer;
  padding: 6px 0;
}
.progress-track {
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  position: relative;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  width: 0%;
  transition: width 0.1s linear;
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: -1px; top: 50%;
  transform: translateY(-50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--text);
  box-shadow: 0 0 8px rgba(79,138,255,0.6);
  opacity: 0;
  transition: opacity 0.2s;
}
.progress-wrap:hover .progress-fill::after { opacity: 1; }

.time-row {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 20px;
}

/* 컨트롤 */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}
.ctrl-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color var(--transition), background var(--transition), transform 0.15s;
  font-size: 18px;
}
.ctrl-btn:hover { color: var(--text); background: var(--surface2); }
.ctrl-btn:active { transform: scale(0.9); }
.ctrl-btn.active { color: var(--accent); }

.play-btn {
  width: 60px; height: 60px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 50%;
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 24px rgba(79,138,255,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
}
.play-btn:hover { transform: scale(1.06); box-shadow: 0 12px 32px rgba(79,138,255,0.5); }
.play-btn:active { transform: scale(0.94); }

/* 볼륨 */
.volume-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.volume-icon { font-size: 14px; color: var(--muted); flex-shrink: 0; }
input[type=range].vol {
  -webkit-appearance: none;
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(to right, var(--accent) var(--vp,70%), var(--surface2) var(--vp,70%));
  outline: none;
  cursor: pointer;
}
input[type=range].vol::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--text);
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  cursor: pointer;
}

/* ── 플레이리스트 카드 ── */
.playlist-card {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.playlist-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.playlist-title {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.playlist-count {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent);
}

.track-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 20px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
  position: relative;
}
.track-item:last-child { border-bottom: none; }
.track-item:hover { background: var(--surface2); }
.track-item.active {
  background: linear-gradient(90deg, rgba(79,138,255,0.08), transparent);
}
.track-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
  border-radius: 0 2px 2px 0;
}

.track-num {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}
.track-item.active .track-num { color: var(--accent); }

.track-thumb {
  width: 40px; height: 40px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.track-thumb .eq-bars {
  display: none;
  position: absolute;
  inset: 0;
  align-items: flex-end;
  justify-content: center;
  gap: 2px;
  padding: 8px 10px;
  background: rgba(0,0,0,0.5);
}
.track-item.active.playing-state .track-thumb .eq-bars { display: flex; }
.track-item.active.playing-state .track-thumb .emoji { display: none; }
.eq-bar {
  flex: 1;
  background: var(--gold);
  border-radius: 1px;
  animation: eq 0.8s ease-in-out infinite alternate;
}
.eq-bar:nth-child(2) { animation-delay: 0.2s; }
.eq-bar:nth-child(3) { animation-delay: 0.4s; }
@keyframes eq {
  from { height: 20%; }
  to   { height: 90%; }
}

.track-meta { flex: 1; min-width: 0; }
.track-name {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.track-item.active .track-name { color: var(--accent); }
.track-dur {
  font-size: 10px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 2px;
}

/* 빈 상태 */
.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.8;
}
.empty-icon { font-size: 32px; margin-bottom: 10px; }

/* 파일 업로드 버튼 */
.upload-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 12px auto 0;
  padding: 10px 20px;
  background: var(--surface2);
  border: 1px dashed var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
  font-family: 'Noto Sans KR', sans-serif;
}
.upload-btn:hover { border-color: var(--accent); color: var(--accent); }
#file-input { display: none; }

/* 토스트 */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 12px;
  color: var(--text);
  box-shadow: var(--shadow);
  transition: transform 0.3s;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }


/* ── 가사 패널 ── */
.lyrics-card {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.lyrics-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.lyrics-header-title {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.lyrics-toggle-icon {
  font-size: 12px;
  color: var(--muted);
  transition: transform var(--transition);
}
.lyrics-toggle-icon.open { transform: rotate(180deg); }
.lyrics-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
}
.lyrics-body.open { max-height: 400px; }
.lyrics-scroll {
  height: 320px;
  overflow-y: auto;
  padding: 16px 0;
  scroll-behavior: smooth;
}
.lyrics-scroll::-webkit-scrollbar { width: 3px; }
.lyrics-scroll::-webkit-scrollbar-track { background: transparent; }
.lyrics-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.lyric-line {
  padding: 7px 24px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  transition: color 0.3s, font-size 0.3s, font-weight 0.3s;
  text-align: center;
  cursor: pointer;
  border-radius: 6px;
  margin: 0 8px;
}
.lyric-line:hover { color: var(--text); background: var(--surface2); }
.lyric-line.active {
  color: var(--text);
  font-size: 15px;
  font-weight: 700;
  background: linear-gradient(90deg, rgba(79,138,255,0.06), transparent);
  position: relative;
}
.lyric-line.active::before {
  content: '';
  position: absolute;
  left: 8px; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 60%;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
  border-radius: 2px;
}
.lyric-line.passed { color: var(--muted); opacity: 0.5; }
.lyrics-empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 12px;
}

@media (max-width: 400px) {
  .play-btn { width: 52px; height: 52px; font-size: 20px; }
  .controls { gap: 14px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">JET <span>PLAYER</span></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="theme-icon" id="theme-icon">🌙</span>
    <button class="theme-btn" onclick="toggleTheme()" title="테마 변경"></button>
  </div>
</div>

<!-- 메인 플레이어 -->
<div class="player-card">
  <div class="artwork-wrap">
    <div class="artwork" id="artwork">🎵</div>
    <div class="artwork-glow"></div>
  </div>

  <div class="track-info">
    <div class="track-title" id="track-title">재생할 음악을 선택하세요</div>
    <div class="track-artist" id="track-artist">JET PLAYER</div>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
  <div class="time-row">
    <span id="time-cur">0:00</span>
    <span id="time-tot">0:00</span>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="prevTrack()" title="이전">⏮</button>
    <button class="ctrl-btn" id="shuffle-btn" onclick="toggleShuffle()" title="셔플">🔀</button>
    <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()" title="반복">🔁</button>
    <button class="ctrl-btn" onclick="nextTrack()" title="다음">⏭</button>
  </div>

  <div class="volume-row">
    <span class="volume-icon">🔈</span>
    <input type="range" class="vol" id="vol-slider" min="0" max="100" value="70" oninput="setVolume(this.value)">
    <span class="volume-icon">🔊</span>
  </div>
</div>

<!-- 가사 -->
<div class="lyrics-card">
  <div class="lyrics-header" onclick="toggleLyrics()">
    <span class="lyrics-header-title">🎤 가사</span>
    <span class="lyrics-toggle-icon open" id="lyrics-icon">▼</span>
  </div>
  <div class="lyrics-body open" id="lyrics-body">
    <div class="lyrics-scroll" id="lyrics-scroll">
      <div class="lyrics-empty" id="lyrics-empty">재생 중인 곡의 가사가 여기에 표시됩니다</div>
    </div>
  </div>
</div>

<!-- 플레이리스트 -->
<div class="playlist-card">
  <div class="playlist-header">
    <span class="playlist-title">플레이리스트</span>
    <span class="playlist-count" id="playlist-count">0곡</span>
  </div>
  <div id="playlist-body">
    <div class="empty-state">
      <div class="empty-icon">🎧</div>
      아직 추가된 음악이 없습니다<br>
      <span style="font-size:11px;">아래 버튼으로 MP3를 추가해보세요</span>
    </div>
  </div>
  <div style="padding:12px 20px;">
    <label class="upload-btn" for="file-input">
      ＋ MP3 파일 추가
    </label>
    <input type="file" id="file-input" accept=".mp3,audio/*" multiple onchange="addFiles(this.files)">
  </div>
</div>

<div class="toast" id="toast"></div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById('audio');
let playlist = [];
let currentIdx = -1;
let shuffle = false;
let repeat = false; // false | 'one' | 'all'
const repeatModes = [false, 'one', 'all'];
let repeatMode = 0;

// ── 테마 ──
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('jet-theme', isDark ? 'light' : 'dark');
}
(function() {
  const saved = localStorage.getItem('jet-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('theme-icon').textContent = saved === 'dark' ? '🌙' : '☀️';
})();

// ── 파일 추가 ──
function addFiles(files) {
  const fileArr = Array.from(files).filter(f => f.type.startsWith('audio'));
  fileArr.forEach(file => {
    const url = URL.createObjectURL(file);
    const name = file.name.replace(/\.[^.]+$/, '').replace(/_/g,' ');
    const idx = playlist.length;
    playlist.push({ name, url, file, duration: 0 });
    const tmp = new Audio();
    tmp.preload = 'metadata';
    tmp.addEventListener('loadedmetadata', () => {
      playlist[idx].duration = tmp.duration || 0;
      renderPlaylist();
    });
    tmp.src = url;
  });
  renderPlaylist();
  showToast(`${fileArr.length}곡 추가됨`);
  if (currentIdx === -1 && playlist.length > 0) loadTrack(0);
}

// ── 플레이리스트 렌더 ──
function renderPlaylist() {
  const body = document.getElementById('playlist-body');
  document.getElementById('playlist-count').textContent = playlist.length + '곡';
  if (!playlist.length) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">🎧</div>아직 추가된 음악이 없습니다<br><span style="font-size:11px;">아래 버튼으로 MP3를 추가해보세요</span></div>`;
    return;
  }
  body.innerHTML = playlist.map((t,i) => `
    <div class="track-item${i===currentIdx?' active':''}" id="ti-${i}" onclick="loadTrack(${i});togglePlay(true)">
      <span class="track-num">${i===currentIdx?'▶':i+1}</span>
      <div class="track-thumb">
        <span class="emoji">🎵</span>
        <div class="eq-bars">
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
        </div>
      </div>
      <div class="track-meta">
        <div class="track-name">${t.name}</div>
        <div class="track-dur">${t.duration > 0 ? fmtTime(t.duration) : "--:--"}</div>
      </div>
    </div>`).join('');
  // playing-state 클래스
  if (currentIdx >= 0 && !audio.paused) {
    document.getElementById(`ti-${currentIdx}`)?.classList.add('playing-state');
  }
}

// ── 트랙 로드 ──
function loadTrack(idx) {
  if (idx < 0 || idx >= playlist.length) return;
  currentIdx = idx;
  const t = playlist[idx];
  audio.src = t.url;
  audio.load();
  document.getElementById('track-title').textContent = t.name;
  document.getElementById('track-artist').textContent = 'JET PLAYER';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('time-cur').textContent = '0:00';
  document.getElementById('time-tot').textContent = '0:00';
  renderPlaylist();
  renderLyrics(t.name);
}

// ── 재생/정지 ──
function togglePlay(forcePlay) {
  if (!playlist.length) return;
  if (currentIdx === -1) loadTrack(0);
  if (forcePlay || audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

audio.addEventListener('play', () => {
  document.getElementById('play-btn').textContent = '⏸';
  document.getElementById('artwork').classList.add('playing');
  document.getElementById(`ti-${currentIdx}`)?.classList.add('playing-state');
});
audio.addEventListener('pause', () => {
  document.getElementById('play-btn').textContent = '▶';
  document.getElementById('artwork').classList.remove('playing');
  document.querySelectorAll('.track-item').forEach(el => el.classList.remove('playing-state'));
});
audio.addEventListener('ended', () => {
  const rm = repeatModes[repeatMode];
  if (rm === 'one') { audio.currentTime = 0; audio.play(); }
  else if (rm === 'all' || shuffle) nextTrack();
  else if (currentIdx < playlist.length - 1) nextTrack();
  else { audio.pause(); document.getElementById('play-btn').textContent = '▶'; }
});
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-cur').textContent = fmtTime(audio.currentTime);
  document.getElementById('time-tot').textContent = fmtTime(audio.duration);
});

// 프로그레스바 클릭
document.getElementById('progress-wrap').addEventListener('click', e => {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});

// ── 이전/다음 ──
function prevTrack() {
  if (!playlist.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  const idx = shuffle ? randIdx() : Math.max(0, currentIdx - 1);
  loadTrack(idx); audio.play();
}
function nextTrack() {
  if (!playlist.length) return;
  const idx = shuffle ? randIdx() : (currentIdx + 1) % playlist.length;
  loadTrack(idx); audio.play();
}
function randIdx() {
  if (playlist.length <= 1) return 0;
  let i; do { i = Math.floor(Math.random() * playlist.length); } while (i === currentIdx);
  return i;
}

function setVolume(v) {
  audio.volume = v / 100;
  document.getElementById('vol-slider').style.setProperty('--vp', v + '%');
}

// ── 유틸 ──
function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2,'0');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

}

async function loadFromGitHub() {
  try {
    const res = await fetch('playlist.json');
    if (!res.ok) return;
    const data = await res.json();
    if (!Array.isArray(data)) return;
    data.forEach(item => {
      playlist.push({ name: item.name, url: item.url, duration: item.duration || 0 });
    });
    renderPlaylist();
    if (playlist.length > 0) loadTrack(0);
    showToast(`${playlist.length}곡 로드됨`);
  } catch(e) {}
}
